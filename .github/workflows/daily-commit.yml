name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00 AM IST (UTC+5:30)
  workflow_dispatch:  # manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Make daily commit
        run: |
          git config user.email "ayush@pulseai.dev"
          git config user.name "htttpsayush"
          echo "Daily update: $(date)" >> activity.log
          git add .
          git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push
